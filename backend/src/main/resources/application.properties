spring.application.name=demo

# Server — Railway injects PORT automatically
server.port=${PORT:8080}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/}
spring.data.mongodb.database=${MONGODB_DATABASE:taskdb}
# Never commit real credentials — set MONGODB_URI as an environment variable

# Index creation requires a live Mongo connection at startup.
# Keep it off by default so the app can start without Mongo; enable via env when needed.
spring.data.mongodb.auto-index-creation=${MONGO_AUTO_INDEX:false}

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-dev-secret-change-me-32bytes}
app.jwt.expiration-seconds=${JWT_EXP_SECONDS:604800}

# CORS — set to your Railway frontend URL in production
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
